name: dependency-updater-ai-mcp
description: 'Dependency Updater Ai MCP server. Tools: check outdated, suggest updates,
  security audit. Built by MEOK AI Labs.'
version: 1.0.0
tools:
- name: check_outdated
  description: MEOK AI Labs tool.
  parameters:
  - name: package_json_content
    type: string
    required: true
- name: suggest_updates
  description: MEOK AI Labs tool.
  parameters:
  - name: requirements_txt
    type: string
    required: true
- name: security_audit
  description: MEOK AI Labs tool.
  parameters:
  - name: dependencies
    type: string
    required: true
- name: generate_lockfile_diff
  description: MEOK AI Labs tool.
  parameters:
  - name: old_deps
    type: string
    required: true
  - name: new_deps
    type: string
    required: true
